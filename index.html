<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora - Búsqueda de Google</title>
    <!-- Favicon personalizado del historial (Play Store) -->
    <link rel="icon" type="image/jpeg" href="https://i.ibb.co/8gFYMC6g/Screenshot-2026-05-09-10-45-37-539-com-android-vending2.jpg">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>

    <style>
        :root {
            --calc-body: #000000;
            --btn-number: #333333;
            --btn-func: #505050;
            --btn-white: #ffffff;
            --text-red: #ff3b30;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ffffff;
            overflow: hidden;
        }

        /* --- CALCULADORA --- */
        #calc-ui {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100%;
        }

        .calculator {
            background-color: var(--calc-body);
            width: 320px; padding: 20px; border-radius: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            position: relative; z-index: 10;
        }

        #screen {
            width: 100%; height: 100px;
            display: flex; align-items: flex-end; justify-content: flex-end;
            padding: 0 20px 10px 20px; box-sizing: border-box;
            color: white; font-size: 3rem; font-weight: 300;
        }

        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

        .btn {
            aspect-ratio: 1 / 1; border: none; border-radius: 50%;
            font-size: 1.4rem; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            transition: filter 0.2s, transform 0.1s; user-select: none;
        }

        .btn:active { filter: brightness(1.4); transform: scale(0.92); }
        .num { background-color: var(--btn-number); color: white; }
        .func { background-color: var(--btn-func); color: white; }
        .ac { background-color: #333333; color: var(--text-red); font-weight: bold; }
        .special { background-color: var(--btn-white); color: black; font-weight: bold; }
        .btn-zero { grid-column: span 2; aspect-ratio: auto; border-radius: 50px; justify-content: flex-start; padding-left: 25px; }

        /* --- MODO JUEGOS --- */
        #secret-os {
            display: none; position: fixed; inset: 0;
            background-color: #000000;
            z-index: 1000; flex-direction: column; align-items: center;
            overflow: hidden;
        }

        .star {
            position: absolute; background: white; border-radius: 50%;
            opacity: 0.5; animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        #mouse-glow {
            position: absolute; width: 800px; height: 800px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.08) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none;
            transform: translate(-50%, -50%); z-index: 1;
        }

        .os-container {
            position: relative; z-index: 2;
            width: 90%; max-width: 1200px; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            padding-top: 50px;
        }

        .os-container h1 {
            font-size: 5rem; color: #fff; margin: 0;
            letter-spacing: 15px; font-weight: 900;
            text-transform: uppercase; text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        .game-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 25px; width: 100%; overflow-y: auto; padding: 40px 0 150px 0;
        }

        /* --- TARJETAS CON AJUSTE DE FOTO --- */
        .card { 
            background: rgba(40, 40, 40, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s;
            overflow: hidden; display: flex; flex-direction: column;
            position: relative;
        }
        
        .card:hover { border-color: #fff; transform: translateY(-5px); background: rgba(60, 60, 60, 0.6); }

        .img-container { 
            position: relative;
            width: 100%; 
            height: 160px;
            overflow: hidden;
            background: #000;
        }

        /* Efecto para rellenar bordes con la propia imagen borrosa */
        .img-blur {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(12px) brightness(0.6);
            transform: scale(1.2);
        }

        /* Imagen principal completa */
        .img-main {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.3s;
        }

        .card:hover .img-main { transform: scale(1.05); }
        
        .card h3 { 
            color: #fff; font-size: 0.75rem; padding: 12px 5px; margin: 0; 
            text-transform: uppercase; letter-spacing: 1px; font-weight: bold;
            background: rgba(0,0,0,0.4);
        }

        .back-btn {
            position: fixed; bottom: 55px;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 12px 25px; border-radius: 15px; cursor: pointer; z-index: 10;
        }

        footer {
            position: fixed; bottom: 15px; color: rgba(255,255,255,0.3);
            font-size: 0.85rem; z-index: 3; font-family: monospace;
        }

        /* --- VISOR JUEGO --- */
        #viewer { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; }
        .nav { background: #000; padding: 15px 25px; display: flex; justify-content: space-between; border-bottom: 1px solid #222; }
        .exit-btn { background: #fff; color: #000; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        iframe { flex-grow: 1; width: 100%; border: none; background: #000; }
    </style>
</head>
<body>

    <!-- CALCULADORA -->
    <div id="calc-ui">
        <div class="calculator">
            <div id="screen">0</div>
            <div class="keypad">
                <button class="btn ac" onclick="cls()">AC</button>
                <button class="btn func" onclick="add('(')">(</button>
                <button class="btn func" onclick="add(')')">)</button>
                <button class="btn special" onclick="add('/')">÷</button>
                <button class="btn num" onclick="add('7')">7</button>
                <button class="btn num" onclick="add('8')">8</button>
                <button class="btn num" onclick="add('9')">9</button>
                <button class="btn special" onclick="add('*')">×</button>
                <button class="btn num" onclick="add('4')">4</button>
                <button class="btn num" onclick="add('5')">5</button>
                <button class="btn num" onclick="add('6')">6</button>
                <button class="btn special" onclick="add('-')">−</button>
                <button class="btn num" onclick="add('1')">1</button>
                <button class="btn num" onclick="add('2')">2</button>
                <button class="btn num" onclick="add('3')">3</button>
                <button class="btn special" onclick="add('+')">+</button>
                <button class="btn num btn-zero" onclick="add('0')">0</button>
                <button class="btn num" onclick="add('.')">.</button>
                <button class="btn special" onclick="solve()">=</button>
            </div>
        </div>
    </div>

    <!-- MODO JUEGOS OCULTO -->
    <div id="secret-os">
        <div id="stars-container"></div>
        <div id="mouse-glow"></div>
        <div class="os-container">
            <h1>JUEGOS</h1>
            <div class="game-grid" id="game-list"></div>
            <button class="back-btn" onclick="goToCalc()">volver a calculadora (k)</button>
            <footer>creado por Paco el butanero</footer>
        </div>
    </div>

    <!-- VISOR -->
    <div id="viewer">
        <div class="nav">
            <span id="game-title" style="color:#fff; font-weight:bold; font-family: monospace;">SISTEMA_ACTIVO</span>
            <button class="exit-btn" onclick="closeGame()">Salir</button>
        </div>
        <iframe id="iframe" src="" allowfullscreen allow="autoplay; fullscreen; gamepad; pointer-lock"></iframe>
    </div>

    <script>
        // Estrellas
        const starsContainer = document.getElementById('stars-container');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size; star.style.height = size;
            star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            starsContainer.appendChild(star);
        }

        const os = document.getElementById('secret-os');
        const glow = document.getElementById('mouse-glow');
        os.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px'; glow.style.top = e.clientY + 'px';
            const moveX = (e.clientX - window.innerWidth/2) * 0.015;
            const moveY = (e.clientY - window.innerHeight/2) * 0.015;
            starsContainer.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });

        document.addEventListener('keydown', (e) => { if (e.key.toLowerCase() === 'k') goToCalc(); });

        const database = [
            // JUEGOS NUEVOS
            { name: "FALL GUYS", thumb: "https://i.ibb.co/RkTNrYxc/descarga-5.jpg", url: "https://d1tmbzjih4bfq6.cloudfront.net/class/Fall-Guys/" },
            { name: "SCRAP METAL", thumb: "https://i.ibb.co/ym8Q3PMx/splash.png", url: "https://geet.in.net/get/scrap-metal/game.html" },
            { name: "CUPHEAD", thumb: "https://i.ibb.co/d4XFrtbV/logo-1.png", url: "https://julianbiancardi.github.io/Cuphead/" },
            { name: "CROSSY ROAD", thumb: "https://i.ibb.co/Xf6p8HTn/crossyroad.webp", url: "https://geet.in.net/get/crossy-road/game.html" },
            { name: "SURVIVAL RACE", thumb: "https://i.ibb.co/pBYPJV16/logo-2.png", url: "https://geet.in.net/get/survival-race/embed.html" },
            { name: "TEMPLE RUN 2", thumb: "https://i.ibb.co/7t8gmXwp/og-icon.png", url: "https://geet.in.net/get/temple-run-2/game.html" },
            
            // RESTO DE LA LISTA
            { name: "Gameboy Games", thumb: "https://i.ibb.co/qLfcTgX2/OIP-13.webp", url: "https://teddblue.github.io/gamebois/" },
            { name: "Stickman Hook", thumb: "https://i.ibb.co/PGKB6wRj/stickman-hook.jpg", url: "https://lnahtml.github.io/a/stickman-hook/" },
            { name: "worldguessr", thumb: "https://i.ibb.co/hJKP4XqY/descarga-4.jpg", url: "https://www.worldguessr.com/?gogy" },
            { name: "DTA 6", thumb: "https://i.ibb.co/nqzfYPpb/DTA-6-image.webp", url: "https://cdn2.unblocked-games-free.com/games/3938/g2SpKqr4HGOjUQzn/285639/keqtfmn01j5v773e5cw2i8shyxdozu55/index.html" },
            { name: "GOOGLE UNBLOCK", thumb: "https://i.ibb.co/dw0z6KNX/logo.png", url: "https://playernations.casadotricolor.com.br/" },
            { name: "ROCKETGOAL.IO", thumb: "https://i.ibb.co/GfnYQCS6/OIP-11.webp", url: "https://games.crazygames.com/es_ES/rocketgoal-io/index.html?instantJoin=true" },
            { name: "DUDE THEFT AUTO", thumb: "https://i.ibb.co/XfCgtkts/loading-1.png", url: "https://game.azgame.io/dude-theft-auto/" },
            { name: "R.E.P.O", thumb: "https://i.ibb.co/1YHNsvhQ/OIP.jpg", url: "https://gamequestfree.github.io/repo/" },
            { name: "GEOMETRY DASH LITE", thumb: "https://i.ibb.co/TxN0VFgV/OIP-8.webp", url: "https://geometrylitegame.org/game/geometry-dash-lite/" },
            { name: "BASKETBALL STARS", thumb: "https://i.ibb.co/3Lxw2t7/descargar.webp", url: "https://db.mathify.top/html/basketball_stars/index.html" },
            { name: "LEVEL DEVIL", thumb: "https://i.ibb.co/YFvyqL5R/descarga-1.jpg", url: "https://bitlifeonline.github.io/level-devil/" },
            { name: "Home Alone", thumb: "https://i.ibb.co/prbbSRnP/descarga.png", url: "https://scaryshawarmakioskanomaly.com/gg/home-alone/" },
            { name: "STEAL A BRAINROT", thumb: "https://i.ibb.co/n8tZDdtj/descarga-2.jpg", url: "https://crazygames.cdn.msnfun.com/9pltx207s22g/v6/index.html" },
            { name: "SUBWAY SURFERS", thumb: "https://i.ibb.co/fVdGjW6h/OIP-3.webp", url: "https://ubg98.github.io/SubwaySurfers/" },
            { name: "CLASH ROYALE", thumb: "https://i.ibb.co/kVd2VCTr/OIP-4.webp", url: "https://db.mathify.top/html/clash_royale/index.html" },
            { name: "DOGE MINER", thumb: "https://i.ibb.co/Jw7WLP6K/OIP-5.webp", url: "https://geet.in.net/get/doge-miner/game.html" },
            { name: "FNAF 1", thumb: "https://i.ibb.co/ZzdW04zV/OIP-6.webp", url: "https://geet.in.net/get/fnaf/game.html" }
        ];

        let current = "";
        const screenDiv = document.getElementById('screen');

        function add(v) { if (current === "" && !isNaN(v)) current = v; else current += v; screenDiv.innerText = current; }
        function cls() { current = ""; screenDiv.innerText = "0"; }

        function solve() {
            if(current === "9012") {
                document.getElementById('calc-ui').style.display = 'none';
                document.getElementById('secret-os').style.display = 'flex';
                render();
            } else {
                try {
                    let res = math.evaluate(current.replace('÷', '/').replace('×', '*').replace('−', '-'));
                    current = res.toString(); screenDiv.innerText = current;
                } catch { screenDiv.innerText = "Error"; setTimeout(cls, 1000); }
            }
        }

        function goToCalc() {
            document.getElementById('secret-os').style.display = 'none';
            document.getElementById('calc-ui').style.display = 'flex';
            document.getElementById('viewer').style.display = 'none';
            cls();
        }

        function render() {
            const list = document.getElementById('game-list');
            list.innerHTML = "";
            database.forEach(j => {
                list.innerHTML += `
                    <div class="card" onclick="openGame('${j.name}','${j.url}')">
                        <div class="img-container">
                            <img class="img-blur" src="${j.thumb}" onerror="this.src='https://i.ibb.co/C0k7X1L/image-0.png'">
                            <img class="img-main" src="${j.thumb}" onerror="this.src='https://i.ibb.co/C0k7X1L/image-0.png'">
                        </div>
                        <h3>${j.name}</h3>
                    </div>`;
            });
        }

        function openGame(name, url) {
            document.getElementById('game-title').innerText = name;
            document.getElementById('iframe').src = url;
            document.getElementById('viewer').style.display = 'flex';
        }

        function closeGame() {
            document.getElementById('viewer').style.display = 'none';
            document.getElementById('iframe').src = "";
        }
    </script>
</body>
</html>
